name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service name to deploy'
        required: true
        type: string
      version:
        description: 'Version to deploy (e.g., v3.2.0)'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
      namespace:
        description: 'Kubernetes namespace'
        required: false
        type: string
      port_run_id:
        description: 'Port action run ID'
        required: false
        type: string

env:
  PORT_CLIENT_ID: ${{ secrets.PORT_CLIENT_ID }}
  PORT_CLIENT_SECRET: ${{ secrets.PORT_CLIENT_SECRET }}
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'company.azurecr.io' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report deployment started to Port
        if: env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            Starting deployment of ${{ inputs.service_name }}:${{ inputs.version }} to ${{ inputs.environment }} 🚀

      - name: Set namespace
        id: namespace
        run: |
          if [ -z "${{ inputs.namespace }}" ]; then
            echo "namespace=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "namespace=${{ inputs.namespace }}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare deployment image
        id: build
        run: |
          echo "🔨 Preparing image for ${{ inputs.service_name }}:${{ inputs.version }}..."
          
          # For demo, we use nginx images with version tags
          # In production, this would build and push your actual service image:
          # docker build -t ${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}:${{ inputs.version }} .
          # docker push ${{ env.DOCKER_REGISTRY }}/${{ inputs.service_name }}:${{ inputs.version }}
          
          # Extract version number (e.g., "v1.25" -> "1.25")
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          
          # Use nginx with the specified version, fallback to 'latest'
          IMAGE_URL="nginx:${VERSION:-latest}"
          
          echo "✅ Using image: $IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: Validate image exists
        id: validate_image
        run: |
          echo "🔍 Validating that image ${{ steps.build.outputs.image_url }} exists..."
          
          # Try to pull the image manifest to verify it exists
          if docker manifest inspect ${{ steps.build.outputs.image_url }} > /dev/null 2>&1; then
            echo "✅ Image exists and is accessible"
            echo "image_valid=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Image ${{ steps.build.outputs.image_url }} does not exist or is not accessible"
            echo ""
            echo "💡 Common nginx versions that work:"
            echo "   - 1.25.0, 1.25.1, 1.25.2, 1.25.3, 1.25.4, 1.25.5"
            echo "   - 1.24.0, 1.23.0, 1.22.0"
            echo "   - latest, stable, mainline"
            echo ""
            echo "🔗 Check available tags: https://hub.docker.com/_/nginx/tags"
            echo ""
            echo "image_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Report image validation failure to Port
        if: failure() && steps.validate_image.outcome == 'failure' && env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          logMessage: |
            ❌ Image validation failed!
            
            The image ${{ steps.build.outputs.image_url }} does not exist or is not accessible.
            
            💡 For this demo, we use nginx images. Common versions that work:
            • 1.25.0, 1.25.1, 1.25.2, 1.25.3, 1.25.4, 1.25.5
            • 1.24.0, 1.23.0, 1.22.0
            • latest, stable, mainline
            
            🔗 Check available nginx tags: https://hub.docker.com/_/nginx/tags
            
            📝 Note: Do not use 'v' prefix for nginx versions (use '1.25.0' not 'v1.25.0')

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure Kubernetes context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          
          # Verify connection
          kubectl cluster-info
          echo "✅ Connected to Kubernetes cluster"
          echo "✅ Target namespace: ${{ steps.namespace.outputs.namespace }}"

      - name: Log - Kubernetes connected
        if: env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            ✅ Connected to Kubernetes cluster
            📍 Target namespace: ${{ steps.namespace.outputs.namespace }}
            🔗 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Deploy to Kubernetes
        id: deploy
        run: |
          echo "🚀 Deploying ${{ inputs.service_name }}:${{ inputs.version }} to ${{ inputs.environment }}..."
          
          # Get container name (first container in the deployment)
          CONTAINER_NAME=$(kubectl get deployment ${{ inputs.service_name }} -n ${{ steps.namespace.outputs.namespace }} -o jsonpath='{.spec.template.spec.containers[0].name}')
          echo "Container name: $CONTAINER_NAME"
          
          # Update deployment with new image
          kubectl set image deployment/${{ inputs.service_name }} \
            $CONTAINER_NAME=${{ steps.build.outputs.image_url }} \
            -n ${{ steps.namespace.outputs.namespace }}
          
          # Record the deployment in history
          kubectl annotate deployment/${{ inputs.service_name }} \
            kubernetes.io/change-cause="Deploy version ${{ inputs.version }} via Port/GitHub Actions" \
            -n ${{ steps.namespace.outputs.namespace }} \
            --overwrite
          
          echo "✅ Deployment updated successfully"
          echo "deploy_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Log - Deployment started
        if: env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            🚀 Deployment command executed
            📦 Image: ${{ steps.build.outputs.image_url }}
            ⏳ Waiting for rollout to complete...

      - name: Wait for rollout
        id: rollout
        run: |
          echo "⏳ Waiting for rollout to complete..."
          
          # Increase timeout to 10 minutes for slower deployments
          kubectl rollout status deployment/${{ inputs.service_name }} \
            -n ${{ steps.namespace.outputs.namespace }} \
            --timeout=10m
          
          echo "✅ Rollout completed successfully"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "completion_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: Diagnose rollout failure
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          echo "❌ Rollout failed or timed out. Collecting diagnostic information..."
          echo ""
          
          echo "=== Deployment Status ==="
          kubectl get deployment ${{ inputs.service_name }} -n ${{ steps.namespace.outputs.namespace }} -o wide || true
          echo ""
          
          echo "=== ReplicaSet Status ==="
          kubectl get rs -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} -o wide || true
          echo ""
          
          echo "=== Pod Status ==="
          kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} -o wide || true
          echo ""
          
          echo "=== Pod Descriptions (for failed/pending pods) ==="
          for pod in $(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} -o jsonpath='{.items[?(@.status.phase!="Running")].metadata.name}'); do
            echo "--- Pod: $pod ---"
            kubectl describe pod $pod -n ${{ steps.namespace.outputs.namespace }} || true
            echo ""
          done
          
          echo "=== Recent Events ==="
          kubectl get events -n ${{ steps.namespace.outputs.namespace }} \
            --field-selector involvedObject.name=${{ inputs.service_name }} \
            --sort-by='.lastTimestamp' \
            --limit=20 || true
          echo ""
          
          echo "=== Pod Logs (for failed pods) ==="
          for pod in $(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} -o jsonpath='{.items[?(@.status.phase!="Running")].metadata.name}'); do
            echo "--- Logs for pod: $pod ---"
            kubectl logs $pod -n ${{ steps.namespace.outputs.namespace }} --tail=50 --all-containers=true || true
            echo ""
            echo "--- Previous logs (if pod restarted) ---"
            kubectl logs $pod -n ${{ steps.namespace.outputs.namespace }} --previous --tail=50 --all-containers=true 2>/dev/null || echo "No previous logs available"
            echo ""
          done
          
          echo "=== Common Issues to Check ==="
          echo "1. Image pull errors - Check if the image exists and registry credentials are correct"
          echo "2. Resource constraints - Check if cluster has enough CPU/memory"
          echo "3. Readiness probes - Check if health check endpoints are working"
          echo "4. Configuration errors - Check environment variables and config maps"
          echo "5. Network policies - Check if pods can communicate as needed"
          
          exit 1

      - name: Log - Rollout failed
        if: failure() && steps.rollout.outcome == 'failure' && env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        run: |
          # Get diagnostic summary
          POD_STATUS=$(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} -o wide 2>/dev/null || echo "Unable to get pod status")
          RECENT_EVENTS=$(kubectl get events -n ${{ steps.namespace.outputs.namespace }} --field-selector involvedObject.name=${{ inputs.service_name }} --sort-by='.lastTimestamp' --limit=5 2>/dev/null || echo "Unable to get events")
          
          # Save to file for Port update
          cat > /tmp/rollout_failure.txt << 'EOFLOG'
          ❌ Rollout failed or timed out
          
          The deployment did not complete within the timeout period. This usually indicates:
          • Image pull errors (image doesn't exist or registry auth failed)
          • Insufficient cluster resources (CPU/memory)
          • Failed readiness/liveness probes
          • Application startup errors
          
          Pod Status:
          EOFLOG
          echo "$POD_STATUS" >> /tmp/rollout_failure.txt
          echo "" >> /tmp/rollout_failure.txt
          echo "Recent Events:" >> /tmp/rollout_failure.txt
          echo "$RECENT_EVENTS" >> /tmp/rollout_failure.txt
          echo "" >> /tmp/rollout_failure.txt
          echo "🔗 View full diagnostics in workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> /tmp/rollout_failure.txt
          
          echo "rollout_failed=true" >> $GITHUB_OUTPUT
      
      - name: Report rollout failure to Port
        if: failure() && steps.rollout.outcome == 'failure' && env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            ❌ Rollout failed or timed out
            
            The deployment did not complete within 10 minutes. Common causes:
            • Image pull errors (check if image exists: ${{ steps.build.outputs.image_url }})
            • Insufficient cluster resources
            • Failed readiness/liveness probes
            • Application startup errors
            
            🔍 Check workflow logs for detailed diagnostics:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Log - Rollout completed
        if: env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          logMessage: |
            ✅ Rollout completed successfully
            ⏱️ Completion time: ${{ steps.rollout.outputs.completion_time }}
            🔍 Verifying pod health...

      - name: Verify deployment
        id: verify
        run: |
          echo "🏥 Verifying deployment health..."
          
          # Get deployment status
          echo "Deployment Status:"
          kubectl get deployment ${{ inputs.service_name }} -n ${{ steps.namespace.outputs.namespace }}
          
          echo ""
          echo "Pod Status:"
          kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }}
          
          # Get pod counts
          READY_PODS=$(kubectl get deployment ${{ inputs.service_name }} -n ${{ steps.namespace.outputs.namespace }} -o jsonpath='{.status.readyReplicas}')
          DESIRED_PODS=$(kubectl get deployment ${{ inputs.service_name }} -n ${{ steps.namespace.outputs.namespace }} -o jsonpath='{.spec.replicas}')
          
          echo ""
          echo "✅ Deployment verified: $READY_PODS/$DESIRED_PODS pods ready"
          echo "healthy_pods=$READY_PODS" >> $GITHUB_OUTPUT
          echo "desired_pods=$DESIRED_PODS" >> $GITHUB_OUTPUT

      - name: Run smoke tests
        id: smoke_tests
        run: |
          echo "🧪 Running smoke tests..."
          
          # Check that all non-terminating pods are in Running state
          NOT_RUNNING=$(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} \
            -o jsonpath='{.items[?(@.status.phase!="Running" && @.status.phase!="Succeeded")].metadata.name}' | \
            grep -v Terminating || true)
          
          # Filter out Terminating pods (normal during rolling update)
          ACTIVE_NOT_RUNNING=$(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} \
            --field-selector=status.phase!=Succeeded \
            -o json | jq -r '.items[] | select(.status.phase != "Running" and (.metadata.deletionTimestamp == null)) | .metadata.name' || true)
          
          if [ -n "$ACTIVE_NOT_RUNNING" ]; then
            echo "⚠️ Some active pods are not running: $ACTIVE_NOT_RUNNING"
            echo "tests_passed=0" >> $GITHUB_OUTPUT
            echo "tests_total=1" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check that all running containers are ready (exclude terminating)
          NOT_READY=$(kubectl get pods -n ${{ steps.namespace.outputs.namespace }} -l app=${{ inputs.service_name }} \
            -o json | jq -r '.items[] | select(.metadata.deletionTimestamp == null and .status.phase == "Running" and (.status.containerStatuses[0].ready == false)) | .metadata.name' || true)
          
          if [ -n "$NOT_READY" ]; then
            echo "⚠️ Some pods are not ready: $NOT_READY"
            echo "tests_passed=0" >> $GITHUB_OUTPUT
            echo "tests_total=1" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "✅ All smoke tests passed"
          echo "  - All active pods are Running ✅"
          echo "  - All containers are Ready ✅"
          echo "  - (Ignoring terminating pods from previous deployment)"
          echo "tests_passed=2" >> $GITHUB_OUTPUT
          echo "tests_total=2" >> $GITHUB_OUTPUT

      - name: Update Port entity with deployment
        if: env.PORT_CLIENT_ID != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ inputs.service_name }}
          blueprint: application
          properties: |
            {
              "current_version": "${{ inputs.version }}",
              "last_deployment_date": "${{ steps.deploy.outputs.deploy_time }}",
              "deployment_status": "deployed",
              "environment": "${{ inputs.environment }}"
            }

      - name: Create namespace in Port
        if: env.PORT_CLIENT_ID != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ steps.namespace.outputs.namespace }}
          blueprint: k8sNamespace
          properties: |
            {
              "name": "${{ steps.namespace.outputs.namespace }}"
            }

      - name: Create deployment in Port
        if: env.PORT_CLIENT_ID != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: UPSERT
          identifier: ${{ inputs.service_name }}-${{ steps.namespace.outputs.namespace }}
          blueprint: k8sDeployment
          properties: |
            {
              "name": "${{ inputs.service_name }}",
              "namespaceName": "${{ steps.namespace.outputs.namespace }}",
              "image": "${{ steps.build.outputs.image_url }}",
              "replicas": ${{ steps.verify.outputs.desired_pods }},
              "availableReplicas": ${{ steps.verify.outputs.healthy_pods }},
              "readyReplicas": ${{ steps.verify.outputs.healthy_pods }},
              "healthStatus": "Healthy",
              "strategy": "RollingUpdate",
              "createdAt": "${{ steps.deploy.outputs.deploy_time }}"
            }
          relations: |
            {
              "application": "${{ inputs.service_name }}",
              "namespace": "${{ steps.namespace.outputs.namespace }}"
            }

      - name: Report deployment success to Port
        if: env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "SUCCESS"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          logMessage: |
            ✅ Deployment completed successfully!
            
            📊 Deployment Summary:
            • Service: ${{ inputs.service_name }}
            • Version: ${{ inputs.version }}
            • Environment: ${{ inputs.environment }}
            • Namespace: ${{ steps.namespace.outputs.namespace }}
            • Image: ${{ steps.build.outputs.image_url }}
            • Deploy Time: ${{ steps.deploy.outputs.deploy_time }}
            • Healthy Pods: ${{ steps.verify.outputs.healthy_pods }}/${{ steps.verify.outputs.desired_pods }}
            • Smoke Tests: ${{ steps.smoke_tests.outputs.tests_passed }}/${{ steps.smoke_tests.outputs.tests_total }} passed
            
            🔗 View workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create deployment summary
        run: |
          echo "# Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Deployment Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Service | ${{ inputs.service_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ inputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | ${{ steps.namespace.outputs.namespace }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ steps.build.outputs.image_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ steps.build.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Time | ${{ steps.deploy.outputs.deploy_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Completion Time | ${{ steps.rollout.outputs.completion_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Healthy Pods | ${{ steps.verify.outputs.healthy_pods }}/${{ steps.verify.outputs.desired_pods }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ steps.smoke_tests.outputs.tests_passed }}/${{ steps.smoke_tests.outputs.tests_total }} ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor application metrics" >> $GITHUB_STEP_SUMMARY
          echo "- Verify SLO compliance" >> $GITHUB_STEP_SUMMARY
          echo "- Check for any alerts or anomalies" >> $GITHUB_STEP_SUMMARY

      - name: Handle deployment failure
        if: failure() && env.PORT_CLIENT_ID != '' && inputs.port_run_id != ''
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ inputs.port_run_id }}
          status: "FAILURE"
          link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          logMessage: |
            ❌ Deployment failed!
            
            📊 Failed Deployment Details:
            • Service: ${{ inputs.service_name }}
            • Version: ${{ inputs.version }}
            • Environment: ${{ inputs.environment }}
            • Namespace: ${{ steps.namespace.outputs.namespace }}
            
            🔗 Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            💡 Next steps:
            • Review the workflow logs for error details
            • Consider rolling back to the previous version
            • Check cluster health: kubectl get pods -n ${{ steps.namespace.outputs.namespace }}
